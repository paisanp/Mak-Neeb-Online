<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>หมากหนีบออนไลน์</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="animations.css"></head><body>
<main><section id="lobby" class="card lobby"><div class="brand"><span>♟</span><div><h1>หมากหนีบออนไลน์</h1><p>ดวลกลยุทธ์แบบเรียลไทม์</p></div></div><label>ชื่อผู้เล่น<input id="playerName" maxlength="20" placeholder="กรอกชื่อของคุณ" autocomplete="nickname"></label><button id="createBtn" class="primary">สร้างห้องใหม่</button><div class="or"><span>หรือเข้าร่วมห้อง</span></div><div class="join"><input id="roomInput" maxlength="6" placeholder="รหัส 6 ตัว"><button id="joinBtn">เข้าห้อง</button></div><p id="lobbyMessage" class="message" aria-live="polite"></p></section>
<section id="game" class="game hidden"><header><div><p class="eyebrow">ห้องแข่งขัน</p><div class="code-row"><strong id="roomCode"></strong><button id="copyBtn" class="small">คัดลอกรหัส</button></div></div><div id="connection" class="online">● เชื่อมต่อแล้ว</div></header><div class="layout"><aside class="card panel"><h2>ผู้เล่น</h2><div id="players"></div><div class="divider"></div><p class="eyebrow">สถานะเกม</p><h3 id="status">กำลังรอผู้เล่น</h3><p id="message" class="message"></p></aside><section id="boardWrap" class="board-wrap"><div id="turnBanner" class="turn-banner turn-banner--waiting" role="status" aria-live="polite"><div id="turnIcon" class="turn-banner__icon">⌛</div><div><div id="turnTitle" class="turn-banner__title">กำลังโหลดเกม</div><div id="turnSubtitle" class="turn-banner__subtitle">กรุณารอสักครู่</div></div></div><div id="board" class="board game-board--disabled" aria-label="กระดานหมากหนีบ"></div><div class="counts"><span>● ดำ <b id="blackCount">8</b></span><span>○ ขาว <b id="whiteCount">8</b></span></div></section><aside class="card actions"><h2>วิธีเล่น</h2><p>เลือกหมากของคุณ แล้วเดินในแนวตั้งหรือแนวนอนโดยห้ามข้ามหมาก หนีบหมากคู่แข่งไว้ระหว่างหมากของคุณเพื่อกิน</p><button id="resignBtn" class="danger">ยอมแพ้</button><button id="rematchBtn" class="hidden">ขอเล่นใหม่</button><button id="leaveBtn" class="ghost">ออกจากห้อง</button></aside></div></section></main><div id="toast" class="toast" role="status" aria-live="polite"></div>
<dialog id="resultModal"><div class="trophy">♛</div><h2 id="resultTitle">เกมจบ</h2><p id="resultReason"></p><button id="modalRematch" class="primary">ขอเล่นใหม่</button><button id="closeModal" class="ghost">ดูผลบนกระดาน</button></dialog>
<script src="/socket.io/socket.io.js"></script><script src="socketService.js"></script><script src="gameBoard.js"></script><script src="app.js"></script></body></html>
